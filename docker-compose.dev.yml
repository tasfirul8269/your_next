# Development stack.
#   docker compose -f docker-compose.dev.yml up --build
#
# - app:        PHP dev server (php artisan serve) on http://localhost:8000
# - vite-admin: Admin Vite HMR dev server (port 5173)
# - vite-shop:  Shop  Vite HMR dev server (port 5174)
# - mysql:      MySQL 8 (data persisted in the `dbdata` volume)
# - mailpit:    catches all outbound mail — web UI at http://localhost:8025
# - adminer:    lightweight DB browser at http://localhost:8081
#
# Source is bind-mounted, so edits are live. Copy .env.example to .env first and set
# DB_HOST=mysql, MAIL_HOST=mailpit, MAIL_PORT=1025.

services:
  app:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    environment:
      XDEBUG_MODE: "off"
    depends_on:
      mysql:
        condition: service_healthy
      mailpit:
        condition: service_started

  vite-admin:
    image: node:20-bookworm
    working_dir: /app/packages/Frooxi/Admin
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

  vite-shop:
    image: node:20-bookworm
    working_dir: /app/packages/Frooxi/Shop
    volumes:
      - .:/app
    ports:
      - "5174:5174"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-nextoutfit}"
      MYSQL_USER: "${DB_USERNAME:-nextoutfit}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-rootsecret}"
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 5s
      timeout: 5s
      retries: 20

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # web UI
      - "1025:1025"   # SMTP

  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    depends_on:
      - mysql

volumes:
  dbdata:
