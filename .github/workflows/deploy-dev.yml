name: Build & Deploy (Dev Flavor)

# On every push to dev: build the dev Docker image, push it to GitHub
# Container Registry (GHCR), then SSH into the VPS and redeploy to the dev environment.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST          - VPS hostname or IP
#   VPS_PORT          - SSH port (e.g. 22)
#   VPS_USERNAME      - SSH user
#   VPS_SSH_KEY       - private SSH key (PEM) for that user
#   VPS_DEV_PROJECT_PATH - absolute path to the checked-out dev project on the VPS

on:
  push:
    branches: [dev]
  workflow_dispatch: {}

concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        id: meta
        run: echo "image=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/prod/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:dev
            ${{ steps.meta.outputs.image }}:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.VPS_DEV_PROJECT_PATH }}"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            export IMAGE="${{ needs.build.outputs.image }}:dev-${{ github.sha }}"
            docker compose -p nextoutfit_dev -f docker-compose.prod.yml pull app
            docker compose -p nextoutfit_dev -f docker-compose.prod.yml up -d
            docker compose -p nextoutfit_dev -f docker-compose.prod.yml exec -T app php artisan migrate --force
            docker compose -p nextoutfit_dev -f docker-compose.prod.yml exec -T app php artisan optimize:clear
            docker compose -p nextoutfit_dev -f docker-compose.prod.yml exec -T app php artisan optimize
            docker image prune -f
