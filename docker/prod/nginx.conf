# Nginx vhost for the production stack.
# Serves static files from the shared public/ volume and proxies PHP to the
# php-fpm `app` container at app:9000.

server {
    listen 80;
    server_name _;

    # Shared volume populated by the app container's entrypoint (see entrypoint.sh).
    # Mounted at the SAME path the php-fpm container uses, so SCRIPT_FILENAME lines up.
    root /var/www/html/public;
    index index.php;

    client_max_body_size 64M;

    # Gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 120;
    }

    # Long cache for built/static assets
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpe?g|gif|ico|webp)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
