; Development PHP settings — generous limits, errors visible.
memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 120
display_errors = On
error_reporting = E_ALL

; Xdebug is installed but OFF by default (no perf hit). To enable step-debugging,
; set `xdebug.mode = debug` here (or override via the PHP_IDE_CONFIG / a custom ini)
; and point your IDE at host.docker.internal:9003, then restart the app container.
xdebug.mode = off
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003
xdebug.start_with_request = yes
